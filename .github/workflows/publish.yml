# Runs tests, then publishes @hyperscript-tools/mcp-server to npm when a GitHub
# release is created. Auth is via npm trusted publishing (OIDC) — no token
# secret — which also attaches build provenance automatically.
# See: https://docs.npmjs.com/generating-provenance-statements

name: Publish

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      # Trusted publishing needs npm >= 11.5.1; Node 24 ships an older 11.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish -w @hyperscript-tools/mcp-server
